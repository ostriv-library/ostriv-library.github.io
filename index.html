<!DOCTYPE html>
<html lang="ua" data-bs-theme="dark">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ostriv Library PEI – Книжкова полиця</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
	<link href="css/styles.css" rel="stylesheet">
	<!-- Google tag (gtag.js) -->
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-VZETC56QET"></script>

		function gtag(){dataLayer.push(arguments);}

		gtag('config', 'G-VZETC56QET');

</head>
<body>
	<nav class="navbar navbar-expand-lg bg-body-tertiary">
		<div class="container-fluid">
			<a class="navbar-brand" href="https://ostriv-library.github.io">Ostriv Library PEI 🇺🇦🇨🇦</a> <span class="d-none d-sm-none d-md-block">Українська бібліотека Острова Принца Едуарда</span>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarSupportedContent">
				<ul class="navbar-nav  ms-auto mb-2 mb-lg-0">
					<li class="nav-item">
						<a class="nav-link active" aria-current="page">Книжкова полиця</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="how-to-get-a-book.html">Як взяти книгу</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>
	<div class="container-fluid">
		<div class="row">
			<aside class="col-lg-3 col-xl-2 sidebar offcanvas-lg offcanvas-start bg-body" tabindex="-1" id="filtersPanel" aria-labelledby="filtersPanelLabel">
				<div class="offcanvas-header d-lg-none">
					<h5 class="offcanvas-title" id="filtersPanelLabel">Фільтри</h5>
					<button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#filtersPanel" aria-label="Close"></button>
				</div>
				<div class="offcanvas-body d-block sidebar-body">
					<div class="mb-3">
						<label for="searchInput" class="form-label visually-hidden">Пошук</label>
						
							<input type="search" class="form-control" id="searchInput" placeholder="Пошук…" aria-label="Пошук" aria-describedby="searchIcon">
						
					</div>

					<div class="mb-4 availability-filter">
						<h6 class="text-uppercase text-body-secondary small mb-2">Наявність</h6>
						<div class="availability-filter-rows" role="group" aria-label="Наявність книг">
							<div class="d-flex justify-content-between align-items-center gap-2 mb-2">
								<div class="form-check m-0 flex-grow-1">
									<input class="form-check-input" type="radio" name="bookAvailable" id="bookAvailable1" autocomplete="off" value="all" checked>
									<label class="form-check-label lh-sm cursor-pointer text-body" for="bookAvailable1"><span class="badge rounded-pill text-bg-secondary">Всі</span></label>
								</div>
								<span id="allBooks" class="badge rounded-pill text-bg-dark flex-shrink-0">
									<span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
								</span>
							</div>
							<div class="d-flex justify-content-between align-items-center gap-2 mb-2">
								<div class="form-check m-0 flex-grow-1">
									<input class="form-check-input" type="radio" name="bookAvailable" id="bookAvailable2" autocomplete="off" value="Yes">
									<label class="form-check-label lh-sm cursor-pointer text-body p-0" for="bookAvailable2"><span class="badge rounded-pill text-bg-success"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" class="bi bi-check-circle-fill" viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/></svg>&nbsp;&nbsp;Доступна</span></label>
								</div>
								<span id="availableBooks" class="badge rounded-pill text-bg-dark flex-shrink-0">
									<span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
								</span>
							</div>
							<div class="d-flex justify-content-between align-items-center gap-2">
								<div class="form-check m-0 flex-grow-1">
									<input class="form-check-input" type="radio" name="bookAvailable" id="bookAvailable3" autocomplete="off" value="No">
									<label class="form-check-label lh-sm cursor-pointer text-body p-0" for="bookAvailable3"><span class="badge rounded-pill text-bg-danger"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" class="bi bi-x-circle-fill" viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M5.354 4.646a.5.5 0 1 0-.708.708L7.293 8l-2.647 2.646a.5.5 0 0 0 .708.708L8 8.707l2.646 2.647a.5.5 0 0 0 .708-.708L8.707 8l2.647-2.646a.5.5 0 0 0-.708-.708L8 7.293z"/></svg>&nbsp;&nbsp;Зайнята</span></label>
								</div>
								<span id="unavailableBooks" class="badge rounded-pill text-bg-dark flex-shrink-0">
									<span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
								</span>
							</div>
						</div>
					</div>

					<div class="mb-4">
						<h6 class="text-uppercase text-body-secondary small mb-2">Мова</h6>
						<div class="form-check d-flex justify-content-between align-items-center">
							<div>
								<input class="form-check-input langFilter" type="checkbox" value="UA" id="langUA" checked>
								<label class="form-check-label" for="langUA">🇺🇦 Українською</label>
							</div>
							<span id="langUACount" class="badge rounded-pill text-bg-dark">
								<span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
							</span>
						</div>
						<div class="form-check d-flex justify-content-between align-items-center">
							<div>
								<input class="form-check-input langFilter" type="checkbox" value="ENG" id="langENG" checked>
								<label class="form-check-label" for="langENG">🇬🇧 English</label>
							</div>
							<span id="langENGCount" class="badge rounded-pill text-bg-dark">
								<span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
							</span>
						</div>
					</div>

					<div class="mb-4">
						<h6 class="text-uppercase text-body-secondary small mb-2">Сортування</h6>
						<div class="d-flex gap-2 align-items-center flex-nowrap">
							<select class="form-select form-select-sm flex-grow-1" id="sortField" aria-label="Поле сортування">
								<option value="Name" selected>За назвою</option>
								<option value="Author">За автором</option>
							</select>
							<button id="sort-button" class="btn btn-dark btn-sm d-flex justify-content-center align-items-center flex-shrink-0 px-2" type="button" aria-label="Сортування за зростанням (А → Я)" title="А → Я / Я → А">
								<svg id="sort-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-sort-alpha-down" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M10.082 5.629 9.664 7H8.598l1.789-5.332h1.234L13.402 7h-1.12l-.419-1.371zm1.57-.785L11 2.687h-.047l-.652 2.157z"/><path d="M12.96 14H9.028v-.691l2.579-3.72v-.054H9.098v-.867h3.785v.691l-2.567 3.72v.054h2.645zM4.5 2.5a.5.5 0 0 0-1 0v9.793l-1.146-1.147a.5.5 0 0 0-.708.708l2 1.999.007.007a.497.497 0 0 0 .7-.006l2-2a.5.5 0 0 0-.707-.708L4.5 12.293z"/></svg>
							</button>
						</div>
					</div>

					<button id="resetFilters" type="button" class="btn btn-link btn-sm w-100 text-body-secondary">
						Скинути фільтри
					</button>
				</div>
			</aside>

			<main class="col-lg-9 col-xl-10">
				<div class="mt-4 mb-3 d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-2">
					<h1 class="mb-1">Книжкова полиця <small class="text-muted h3" id="bookCount">…</small></h1>
					<button class="btn btn-outline-light d-lg-none align-self-start" type="button" data-bs-toggle="offcanvas" data-bs-target="#filtersPanel" aria-controls="filtersPanel">
						<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-funnel" viewBox="0 0 16 16"><path d="M1.5 1.5A.5.5 0 0 1 2 1h12a.5.5 0 0 1 .39.812l-4.89 6.112V14.5a.5.5 0 0 1-.724.447l-3-1.5A.5.5 0 0 1 5.5 13V7.924L.61 1.812A.5.5 0 0 1 1.5 1.5zm1.04.5 4.358 5.447a.5.5 0 0 1 .102.312V12.69l2 1V7.759a.5.5 0 0 1 .102-.312L13.46 2H2.54z"/></svg>
						Фільтри
					</button>
				</div>

				<div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 row-cols-xxl-5 g-4" id="data-container">
					<div class="d-flex flex-column min-vw-100" style="min-height: calc(100vh - 310px);">
						<div class="d-flex flex-grow-1 justify-content-center align-items-center">
							<div class="spinner-border" role="status">
								<span class="visually-hidden">Завантаження...</span>
							</div>
						</div>
					</div>
				</div>
			</main>
		</div>
	</div>
	<hr class="mt-4">
	<footer class="container-fluid">
		<p class="float-end">
			<a href="#" title="Наверх"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-arrow-up-circle" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M1 8a7 7 0 1 0 14 0A7 7 0 0 0 1 8m15 0A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-7.5 3.5a.5.5 0 0 1-1 0V5.707L5.354 7.854a.5.5 0 1 1-.708-.708l3-3a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 5.707z"/></svg></a>
		</p>
		<p>© 2026, Українська бібліотека на PEI. <br><span class="small text-body-secondary">Дизайн та розробка <a href="https://burdyga.design/" target="_blank">Burdyga.Design</a></span></p>
	</footer>
	<div class="modal fade" id="myModal" tabindex="-1" aria-labelledby="myModalLabel" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
			<div class="modal-content">
				<div class="modal-header">
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<div class="modal-body" id="modalContent">
				</div>
			</div>
		</div>
	</div>
	<script src="js/scripts.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
